name: MingSky Narrative Regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/routes/ai.js'
      - 'src/routes/v1Ai.js'
      - 'src/services/openaiService.js'
      - 'src/services/mingskyNarrativeService.js'
      - 'src/services/mingkongAiReplyService.js'
      - 'src/services/mingkongReplyValidationService.js'
      - 'src/services/openai-payload-builder.ts'
      - 'src/services/reply-service.ts'
      - 'src/services/reply-service.spec.ts'
      - 'src/services/golden-test-runner.ts'
      - 'src/services/__fixtures__/contract-pair.*.json'
      - 'src/services/__fixtures__/golden-test-cases.v1.json'
      - 'src/schemas/mingsky-narrative-output.*'
      - 'src/schemas/profile-card.schema.json'
      - 'src/schemas/intent-packet.schema.json'
      - 'src/schemas/semantic-profile.schema.json'
      - 'src/schemas/session-state.schema.json'
      - 'src/schemas/mingkong-ai-reply-v1.schema.json'
      - 'scripts/runMingskyNarrativeRegression.js'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - 'src/routes/ai.js'
      - 'src/routes/v1Ai.js'
      - 'src/services/openaiService.js'
      - 'src/services/mingskyNarrativeService.js'
      - 'src/services/mingkongAiReplyService.js'
      - 'src/services/mingkongReplyValidationService.js'
      - 'src/services/openai-payload-builder.ts'
      - 'src/services/reply-service.ts'
      - 'src/services/reply-service.spec.ts'
      - 'src/services/golden-test-runner.ts'
      - 'src/services/__fixtures__/contract-pair.*.json'
      - 'src/services/__fixtures__/golden-test-cases.v1.json'
      - 'src/schemas/mingsky-narrative-output.*'
      - 'src/schemas/profile-card.schema.json'
      - 'src/schemas/intent-packet.schema.json'
      - 'src/schemas/semantic-profile.schema.json'
      - 'src/schemas/session-state.schema.json'
      - 'src/schemas/mingkong-ai-reply-v1.schema.json'
      - 'scripts/runMingskyNarrativeRegression.js'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  regression:
    name: Narrative Regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run MingSky narrative regression
        id: regression
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github-artifacts
          npm run test:mingsky-narrative | tee .github-artifacts/mingsky-narrative-regression.log

      - name: Run MingKong reply regression
        id: mingkong_reply_regression
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github-artifacts
          npm run test:mingkong-reply | tee .github-artifacts/mingkong-reply-regression.log

      - name: Add job summary
        if: always()
        shell: bash
        run: |
          {
            echo '## MingSky Narrative Regression'
            echo
            echo '- Command: `npm run test:mingsky-narrative`'
            echo
            echo '```text'
            if [ -f .github-artifacts/mingsky-narrative-regression.log ]; then
              cat .github-artifacts/mingsky-narrative-regression.log
            else
              echo 'No regression log generated.'
            fi
            echo '```'
            echo
            echo '## MingKong Reply Regression'
            echo
            echo '- Command: `npm run test:mingkong-reply`'
            echo
            echo '```text'
            if [ -f .github-artifacts/mingkong-reply-regression.log ]; then
              cat .github-artifacts/mingkong-reply-regression.log
            else
              echo 'No MingKong reply regression log generated.'
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mingsky-narrative-regression-log
          path: .github-artifacts/mingsky-narrative-regression.log

      - name: Upload MingKong reply regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mingkong-reply-regression-log
          path: .github-artifacts/mingkong-reply-regression.log
